{{ define "main" }}
<div class="content">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="blog-list">
    {{ range .Pages.ByDate.Reverse }}
    <article>
      <div class="meta">{{ .Date.Format "January 2, 2006" }} {{ with .Params.categories }}· {{ delimit . ", " }}{{ end }}</div>
      <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
      <p>{{ .Description | default .Summary }}</p>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
