{{ define "main" }}
<div class="content">
  <article>
    <h1>{{ .Title }}</h1>
    <div class="meta" style="color: var(--brown-warm); font-size: 0.9rem; margin-bottom: 2rem;">
      {{ .Date.Format "January 2, 2006" }}
      {{ with .Params.categories }} · {{ delimit . ", " }}{{ end }}
      {{ with .ReadingTime }} · {{ . }} min read{{ end }}
    </div>
    {{ .Content }}
    {{ if .Params.cta }}
    <a href="https://wa.me/{{ .Site.Params.whatsapp }}" class="cta">Get in Touch</a>
    {{ end }}
  </article>
</div>
{{ end }}
