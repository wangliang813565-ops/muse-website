{{ define "main" }}

<style>
  .products-hero { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--taupe); }
  .products-hero img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
  .products-hero-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, rgba(58,48,40,0.75) 0%, rgba(58,48,40,0.3) 40%, transparent 65%);
    display: flex; align-items: flex-start; justify-content: center; padding: 2.5rem 6% 0;
  }
  .products-hero-text { max-width: 600px; text-align: center; }
  .products-hero-text h1 { font-family: var(--font-heading); font-size: 2.6rem; color: var(--pearl); margin-bottom: 0.8rem; letter-spacing: 2px; }
  .products-hero-text p { color: var(--blush); font-size: 1.05rem; line-height: 1.8; }
  @media (max-width: 768px) {
    .products-hero { aspect-ratio: 4/3; }
    .products-hero-text h1 { font-size: 1.5rem; }
    .products-hero-text p { font-size: 0.88rem; }
    .products-hero-overlay { padding: 2rem 1.2rem; }
  }
</style>

<!-- Hero -->
<div class="products-hero">
  <img src="{{ "images/products_hero.jpg" | relURL }}" alt="MUSE Product Collection">
  <div class="products-hero-overlay">
    <div class="products-hero-text">
      <h1>{{ .Params.hero_title | default .Title }}</h1>
      <p>{{ .Description }}</p>
    </div>
  </div>
</div>

<div class="product-grid" style="max-width:var(--max-width); margin:2rem auto; padding:0 1rem;">
  {{ range .Pages }}
  <a href="{{ .Permalink }}" class="product-card" style="text-decoration:none;">
    {{ with .Params.image }}
    <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
    {{ end }}
    <div class="product-name">{{ .Title }}</div>
    {{ with .Params.name_zh }}<div style="font-size:0.75rem; color:var(--greige); text-align:center; padding:0 0.8rem 0.6rem;">{{ . }}</div>{{ end }}
  </a>
  {{ end }}
</div>

{{ end }}
